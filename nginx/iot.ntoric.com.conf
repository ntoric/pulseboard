# Host nginx site for iot.ntoric.com
# Install: sudo cp nginx/iot.ntoric.com.conf /etc/nginx/sites-available/iot.ntoric.com
#          sudo ln -sf /etc/nginx/sites-available/iot.ntoric.com /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# Docker publishes:
#   backend  → 127.0.0.1:8097
#   frontend → 127.0.0.1:5010

upstream pulseboard_backend {
    server 127.0.0.1:8097;
    keepalive 32;
}

upstream pulseboard_frontend {
    server 127.0.0.1:5010;
    keepalive 16;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name iot.ntoric.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name iot.ntoric.com;

    ssl_certificate     /etc/letsencrypt/live/iot.ntoric.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iot.ntoric.com/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 16m;

    location /ws/ {
        proxy_pass http://pulseboard_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    location /api/ {
        proxy_pass http://pulseboard_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://pulseboard_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
