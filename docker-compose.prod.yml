# Production stack — image only (no build context).
# Images are published by .github/workflows/dockerhub-release.yml on git tags:
#   ntoric/pulserboard:frontend
#   ntoric/pulserboard:backend
#
# Example:
#   docker compose -f docker-compose.prod.yml up -d

services:
  backend:
    image: ${IMAGE_NAME:-ntoric/pulserboard}:backend
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATA_DIR: /app/data
    volumes:
      - ./app-data:/app/data
    expose:
      - "8097:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8097/api/devices"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - pulseboard

  frontend:
    image: ${IMAGE_NAME:-ntoric/pulserboard}:frontend
    restart: unless-stopped
    expose:
      - "5010:80"
    networks:
      - pulseboard

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/iot.ntoric.com.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - pulseboard

networks:
  pulseboard:
    driver: bridge
