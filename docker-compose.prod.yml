# Production stack — image only (no build context).
# TLS / reverse proxy is handled by host nginx (see nginx/iot.ntoric.com.conf).
#
# Images from .github/workflows/dockerhub-release.yml (Docker Hub):
#   ntoric/pulserboard:frontend
#   ntoric/pulserboard:backend
#
#   docker compose -f docker-compose.prod.yml up -d

services:
  backend:
    image: ntoric/pulserboard:backend
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATA_DIR: /app/data
    volumes:
      - app-data:/app/data
    ports:
      - "8097:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/devices"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: ntoric/pulserboard:frontend
    restart: unless-stopped
    ports:
      - "5010:80"

volumes:
  app-data:
