# Production stack — image only (no build context).
# Images are published by .github/workflows/dockerhub-release.yml on git tags:
#   ntoric/pulserboard:frontend
#   ntoric/pulserboard:backend
#
# Example:
#   mkdir -p app-data && sudo chown -R 10001:10001 app-data
#   docker compose -f docker-compose.prod.yml up -d

services:
  backend:
    image: ${IMAGE_NAME:-ntoric/pulserboard}:backend
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATA_DIR: /app/data
    volumes:
      - ./app-data:/app/data
    ports:
      - "127.0.0.1:8097:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/devices"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - pulseboard

  frontend:
    image: ${IMAGE_NAME:-ntoric/pulserboard}:frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:5010:80"
    networks:
      - pulseboard

networks:
  pulseboard:
    driver: bridge
